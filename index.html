<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TI Transit">
<meta name="theme-color" content="#0a0f1e">
<title>TI Transit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --surface2: #1a2235;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f4ff;
    --muted: #6b7ea0;
    --dim: #3a4a6a;
    --ferry: #38bdf8;
    --ferry-dim: rgba(56,189,248,0.12);
    --bus: #a78bfa;
    --bus-dim: rgba(167,139,250,0.12);
    --amber: #fbbf24;
    --green: #34d399;
    --red: #f87171;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    overflow-x: hidden;
  }

  .app {
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    padding: env(safe-area-inset-top, 20px) 0 env(safe-area-inset-bottom, 20px);
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    padding: 24px 20px 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .brand {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
  }

  .day-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border: 1px solid var(--border2);
    border-radius: 20px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* Location strip */
  .location-strip {
    margin: 20px 20px 0;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .location-strip:active { border-color: var(--border2); }

  .loc-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    flex-shrink: 0;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--green); }
    50% { opacity: 0.6; box-shadow: 0 0 4px var(--green); }
  }

  .loc-text {
    flex: 1;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text);
  }
  .loc-text span { color: var(--muted); }

  .loc-refresh {
    font-size: 16px;
    opacity: 0.5;
  }

  /* Clock */
  .clock-area {
    padding: 28px 20px 0;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .clock {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* Next card - hero */
  .next-hero {
    margin: 16px 20px 0;
    padding: 20px;
    border-radius: 16px;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
    min-height: 140px;
  }
  .next-hero.ferry-theme {
    background: linear-gradient(135deg, rgba(56,189,248,0.08) 0%, rgba(56,189,248,0.02) 100%);
    border-color: rgba(56,189,248,0.2);
  }
  .next-hero.bus-theme {
    background: linear-gradient(135deg, rgba(167,139,250,0.08) 0%, rgba(167,139,250,0.02) 100%);
    border-color: rgba(167,139,250,0.2);
  }
  .next-hero.none-theme {
    background: var(--surface);
  }

  .next-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 10px;
  }

  .next-mode-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    font-family: 'DM Mono', monospace;
    margin-bottom: 10px;
  }
  .ferry-badge { background: var(--ferry-dim); color: var(--ferry); }
  .bus-badge { background: var(--bus-dim); color: var(--bus); }

  .next-time-big {
    font-size: 52px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }
  .ferry-theme .next-time-big { color: var(--ferry); }
  .bus-theme .next-time-big { color: var(--bus); }
  .none-theme .next-time-big { color: var(--dim); font-size: 28px; }

  .next-dest {
    font-size: 13px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .countdown-chip {
    position: absolute;
    top: 20px;
    right: 20px;
    text-align: right;
  }
  .countdown-mins {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    line-height: 1;
  }
  .countdown-mins.urgent { color: var(--red); }
  .countdown-mins.soon { color: var(--amber); }
  .countdown-mins.ok { color: var(--green); }
  .countdown-unit {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    font-family: 'DM Mono', monospace;
  }

  /* All upcoming */
  .section-label {
    margin: 24px 20px 8px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--dim);
    font-family: 'DM Mono', monospace;
  }

  .upcoming-list {
    margin: 0 20px;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    background: var(--surface);
  }

  .upcoming-row {
    display: flex;
    align-items: center;
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    transition: background 0.15s;
  }
  .upcoming-row:last-child { border-bottom: none; }
  .upcoming-row.is-next {
    background: var(--surface2);
  }

  .row-icon {
    font-size: 14px;
    width: 20px;
    text-align: center;
    flex-shrink: 0;
  }
  .row-time {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    width: 58px;
    flex-shrink: 0;
  }
  .ferry-time { color: var(--ferry); }
  .bus-time { color: var(--bus); }

  .row-dest {
    flex: 1;
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .row-mins {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--dim);
  }

  /* Tab bar for location override */
  .loc-tabs {
    margin: 20px 20px 0;
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 3px;
    gap: 2px;
  }
  .loc-tab {
    flex: 1;
    padding: 7px 4px;
    text-align: center;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    border-radius: 7px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
    font-family: 'DM Mono', monospace;
  }
  .loc-tab.active {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border2);
  }

  /* Error/status */
  .status-msg {
    margin: 12px 20px 0;
    padding: 10px 14px;
    background: rgba(251,191,36,0.08);
    border: 1px solid rgba(251,191,36,0.2);
    border-radius: 10px;
    font-size: 12px;
    color: var(--amber);
    font-family: 'DM Mono', monospace;
    display: none;
  }
  .status-msg.visible { display: block; }

  .footer {
    margin-top: auto;
    padding: 20px 20px 0;
    font-size: 10px;
    color: var(--dim);
    font-family: 'DM Mono', monospace;
    text-align: center;
    letter-spacing: 0.05em;
  }

  /* Spinner */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--dim);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .no-service {
    padding: 16px;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--dim);
  }
</style>
</head>

// ─── SCHEDULE DATA ────────────────────────────────────────────────────────────
// All times as minutes from midnight for fast math

function t(str) {
  // "7:30am" or "7:30 AM" → minutes from midnight
  const s = str.trim().toLowerCase().replace(/\s/g, '');
  const ampm = s.includes('am') ? 'am' : 'pm';
  const clean = s.replace('am','').replace('pm','');
  const [h, m] = clean.split(':').map(Number);
  let hrs = h;
  if (ampm === 'pm' && h !== 12) hrs += 12;
  if (ampm === 'am' && h === 12) hrs = 0;
  return hrs * 60 + (m || 0);
}

function fmt(mins) {
  // minutes from midnight → "7:30 AM"
  const h24 = ((mins % 1440) + 1440) % 1440;
  const h = Math.floor(h24 / 60);
  const m = h24 % 60;
  const ampm = h < 12 ? 'AM' : 'PM';
  const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
  return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function getNearestLocation(lat, lon) {
  let best = null, bestDist = Infinity;
  for (const [key, loc] of Object.entries(LOCATIONS)) {
    const d = haversine(lat, lon, loc.lat, loc.lon);
    if (d < bestDist) { bestDist = d; best = key; }
  }
  return { key: best, dist: bestDist };
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentLocation = null; // 'ti' | 'ferry' | 'transit'
let tabOverride = 'auto';
let userLat = null, userLon = null;

// ─── SCHEDULE LOGIC ───────────────────────────────────────────────────────────
function getDayType() {
  const d = new Date().getDay(); // 0=sun, 6=sat
  if (d === 0) return 'sunday';
  if (d === 6) return 'saturday';
  return 'weekday';
}

function nowMins() {
  const n = new Date();
  return n.getHours() * 60 + n.getMinutes();
}

// Returns array of {time(mins), mode, dest} sorted by time, upcoming only
function getUpcomingDepartures(locKey, limit = 8) {
  const day = getDayType();
  const now = nowMins();
  const deps = [];

  if (locKey === 'ti') {
    // Ferry TI → SF
    for (const m of FERRY_TI_TO_SF[day]) {
      deps.push({ time: m, mode: 'ferry', dest: 'Ferry Building' });
    }
    // Bus TI → Transit Center
    for (const m of BUS_TI_TO_SF[day]) {
      deps.push({ time: m, mode: 'bus', dest: 'Transbay Transit Ctr' });
    }
  } else if (locKey === 'ferry') {
    // Ferry SF → TI
    for (const m of FERRY_SF_TO_TI[day]) {
      deps.push({ time: m, mode: 'ferry', dest: 'Treasure Island' });
    }
  } else if (locKey === 'transit') {
    // Bus Transit Center → TI
    for (const m of BUS_SF_TO_TI[day]) {
      deps.push({ time: m, mode: 'bus', dest: 'Treasure Island' });
    }
  }

  // Sort, handle after-midnight times (>1440 wrap)
  deps.sort((a, b) => a.time - b.time);

  // Filter: upcoming (within next 4 hours, or just future)
  // Handle overnight: if time < 360 (6am), treat as next-day by adding 1440 if now > 18*60
  const upcoming = deps.map(d => {
    let adjTime = d.time;
    if (d.time < 360 && now > 18 * 60) adjTime = d.time + 1440;
    return { ...d, adjTime };
  }).filter(d => d.adjTime >= now).sort((a,b) => a.adjTime - b.adjTime);

  return upcoming.slice(0, limit);
}

// ─── UI UPDATE ────────────────────────────────────────────────────────────────
function updateUI() {
  const loc = currentLocation;
  const now = nowMins();
  const upcoming = loc ? getUpcomingDepartures(loc) : [];
  const next = upcoming[0];

  // Hero card
  const hero = document.getElementById('nextHero');
  const nextTimeEl = document.getElementById('nextTime');
  const nextDestEl = document.getElementById('nextDest');

  if (!loc) {
    hero.className = 'next-hero none-theme';
    nextTimeEl.textContent = '--:--';
    nextDestEl.textContent = 'tap the location strip above';
    document.getElementById('countdownArea')?.remove();
    return;
  }

  if (!next) {
    hero.className = 'next-hero none-theme';
    nextTimeEl.style.fontSize = '22px';
    nextTimeEl.textContent = 'No more service';
    nextDestEl.textContent = 'Check tomorrow\'s schedule';
  } else {
    const minsAway = next.adjTime - now;
    const isFerry = next.mode === 'ferry';

    hero.className = `next-hero ${isFerry ? 'ferry' : 'bus'}-theme`;

    // Mode badge
    let badge = hero.querySelector('.next-mode-badge');
    if (!badge) {
      badge = document.createElement('div');
      badge.className = 'next-mode-badge';
      hero.insertBefore(badge, hero.querySelector('.next-time-big'));
    }
    badge.className = `next-mode-badge ${isFerry ? 'ferry' : 'bus'}-badge`;
    badge.textContent = isFerry ? '⛴ Ferry' : '🚌 Bus 25';

    nextTimeEl.style.fontSize = '52px';
    nextTimeEl.textContent = fmt(next.adjTime);
    nextDestEl.textContent = `→ ${next.dest}`;

    // Countdown
    let cc = hero.querySelector('.countdown-chip');
    if (!cc) {
      cc = document.createElement('div');
      cc.className = 'countdown-chip';
      cc.innerHTML = `<div class="countdown-mins" id="ccMins"></div><div class="countdown-unit">min away</div>`;
      hero.appendChild(cc);
    }
    const ccMins = cc.querySelector('.countdown-mins');
    ccMins.textContent = minsAway;
    ccMins.className = `countdown-mins ${minsAway <= 5 ? 'urgent' : minsAway <= 15 ? 'soon' : 'ok'}`;
  }

  // Upcoming list
  const list = document.getElementById('upcomingList');
  if (upcoming.length === 0) {
    list.innerHTML = '<div class="no-service">No more departures today</div>';
    return;
  }

  list.innerHTML = upcoming.map((dep, i) => {
    const minsAway = dep.adjTime - now;
    const isFerry = dep.mode === 'ferry';
    return `<div class="upcoming-row ${i === 0 ? 'is-next' : ''}">
      <div class="row-icon">${isFerry ? '⛴' : '🚌'}</div>
      <div class="row-time ${isFerry ? 'ferry-time' : 'bus-time'}">${fmt(dep.adjTime)}</div>
      <div class="row-dest">→ ${dep.dest}</div>
      <div class="row-mins">${minsAway}m</div>
    </div>`;
  }).join('');
}

// ─── LOCATION DETECTION ───────────────────────────────────────────────────────
function detectLocation() {
  const txt = document.getElementById('locText');
  const spinner = document.getElementById('locSpinner');
  txt.innerHTML = '<span><span class="spinner"></span> Detecting...</span>';
  spinner.textContent = '';

  if (!navigator.geolocation) {
    showStatus('Geolocation not supported. Use manual tabs above.');
    txt.innerHTML = '<span>Location unavailable</span>';
    return;
  }

  navigator.geolocation.getCurrentPosition(pos => {
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;
    const { key, dist } = getNearestLocation(userLat, userLon);
    currentLocation = key;

    const distM = Math.round(dist);
    const locNames = { ti: 'Treasure Island', ferry: 'Ferry Building', transit: 'Transbay Transit Ctr' };
    txt.innerHTML = `${locNames[key]} <span>· ${distM < 1000 ? distM+'m away' : (dist/1000).toFixed(1)+'km'}</span>`;
    spinner.textContent = '⟳';

    if (dist > 2000) {
      showStatus(`Nearest stop is ${Math.round(dist/1000*10)/10}km away — override with tabs if needed`);
    } else {
      hideStatus();
    }

    // Set active tab
    setActiveTab('auto');
    updateUI();
  }, err => {
    txt.innerHTML = '<span>Location denied — use tabs below</span>';
    spinner.textContent = '⟳';
    showStatus('Location access denied. Select your location manually using the tabs.');
  }, { enableHighAccuracy: true, timeout: 10000 });
}

function setTabLocation(tab) {
  tabOverride = tab;
  setActiveTab(tab);
  if (tab === 'auto') {
    if (userLat !== null) {
      const { key } = getNearestLocation(userLat, userLon);
      currentLocation = key;
    } else {
      detectLocation();
      return;
    }
  } else {
    currentLocation = tab;
    const locNames = { ti: 'Treasure Island', ferry: 'Ferry Building', transit: 'Transbay Transit Ctr' };
    document.getElementById('locText').innerHTML = `${locNames[tab]} <span>· manual</span>`;
    hideStatus();
  }
  updateUI();
}

function setActiveTab(tab) {
  ['auto','ti','ferry','transit'].forEach(id => {
    document.getElementById('tab-'+id)?.classList.toggle('active', id === tab);
  });
}

function showStatus(msg) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.classList.add('visible');
}
function hideStatus() {
  document.getElementById('statusMsg').classList.remove('visible');
}

// ─── CLOCK ────────────────────────────────────────────────────────────────────
function updateClock() {
  const n = new Date();
  const h = n.getHours(), m = n.getMinutes(), s = n.getSeconds();
  const ampm = h < 12 ? 'AM' : 'PM';
  const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
  document.getElementById('clockEl').textContent =
    `${h12}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} ${ampm}`;

  // Day badge
  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  document.getElementById('dayBadge').textContent = days[n.getDay()];
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
updateClock();
setInterval(() => {
  updateClock();
  updateUI(); // refresh countdown every second
}, 1000);

// Auto-detect on load
window.addEventListener('load', () => {
  detectLocation();
});
</script>
